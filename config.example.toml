# NyaGallery backend configuration.
#
# Copy this file to nyagallery.toml, or start with:
#   nyagallery --config path\to\nyagallery.toml serve
#
# Environment variables still work and override this file:
#   NYAGALLERY_STORAGE, NYAGALLERY_DATABASE_URL, NYAGALLERY_SECURE_COOKIES,
#   PIXIV_REFRESH_TOKEN, NYAGALLERY_SITE_ICP_BEIAN, NYAGALLERY_REDIS_URL,
#   NYAGALLERY_STORAGE_STRATEGY, NYAGALLERY_SECRET_KEY, NYAGALLERY_NETWORK_PROXY,
#   NYAGALLERY_CONFIG_EDITOR_ENABLED, NYAGALLERY_DEVELOPER_CONSOLE_ENABLED, etc.

[core]
# Required. Root directory for originals, metadata, cache, tags and logs.
storage = "storage"

# Optional. Empty uses storage/nyagallery.db.
# Examples:
# database_url = "sqlite:///E:/Code/NyaGallery/storage/nyagallery.db"
# database_url = "postgresql+psycopg://user:password@127.0.0.1:5432/nyagallery"
database_url = ""

# Optional. Empty uses storage/tags/catalog.json.
tag_catalog_path = ""

[original_storage]
# Original file storage strategy used by upload and Pixiv sync when the request
# does not choose a strategy explicitly. `local` is always available and writes
# to storage/original. Remote originals are cached under storage/remote-cache
# when they are downloaded or used for preview generation.
default_strategy = "local"

# Add remote strategies as needed. The admin upload and Pixiv panels will show
# configured strategy names. Keep secrets in nyagallery.toml, not in git.
#
# [[original_storage.strategies]]
# name = "webdav-main"
# type = "webdav"
# endpoint = "https://dav.example.com/nyagallery/"
# username = ""
# password = ""
# token = ""
# prefix = "original"
# timeout_seconds = 60
#
# [[original_storage.strategies]]
# name = "upyun-main"
# type = "upyun"
# endpoint = "https://v0.api.upyun.com"
# bucket = "your-service"
# username = "operator"
# password = ""
# prefix = "original"
#
# [[original_storage.strategies]]
# name = "aliyun-oss-main"
# type = "aliyun_oss"
# endpoint = "https://oss-cn-hangzhou.aliyuncs.com"
# bucket = "your-bucket"
# access_key_id = ""
# access_key_secret = ""
# prefix = "original"
#
# [[original_storage.strategies]]
# name = "onedrive-main"
# type = "onedrive"
# token = ""
# drive_id = ""
# root_path = "NyaGallery"
# prefix = "original"

[server]
host = "127.0.0.1"
port = 8001
access_log = false

# Enable when serving directly over HTTPS or behind a trusted HTTPS proxy
# that preserves secure cookies correctly.
secure_cookies = false

[site]
# Public project links shown by the frontend.
project_homepage = "https://github.com/NayaCcR/NyaGallery"
repository = "https://github.com/NayaCcR/NyaGallery"

# Optional ICP filing number. Leave empty to hide it in the footer.
# Example: icp_beian = "京ICP备00000000号-1"
icp_beian = ""

[pixiv]
# Optional. Prefer saved per-user credentials in the admin page for daily use.
refresh_token = ""
cookie = ""

# Defaults shown in the admin Pixiv panel.
default_request_delay_seconds = 1.0
max_concurrency = 1

[network]
# Proxy profile name used when a source has no explicit rule. Empty/direct/none
# means direct connection. You may also set NYAGALLERY_NETWORK_PROXY to provide
# a deployment-wide default proxy URL without editing this file.
default_proxy = "direct"

[[network.proxies]]
name = "direct"
url = ""
auth_enabled = false
username = ""
password = ""

# Proxy URLs are saved as plain server addresses. If the proxy requires
# authentication, enable auth_enabled and put credentials in username/password;
# password is encrypted when security.secret_key is present.
#
# [[network.proxies]]
# name = "local"
# url = "http://127.0.0.1:7890"
# auth_enabled = false
# username = ""
# password = ""
#
# [[network.proxies]]
# name = "jp"
# url = "http://example.com:8080"
# auth_enabled = true
# username = "user"
# password = ""

[network.sources.pixiv]
# The table name matches the backend source key used by a fetcher, not a URL or
# domain pattern. Pixiv currently uses "pixiv"; later fetchers can add their own
# keys, e.g. [network.sources.x], [network.sources.fanbox], [network.sources.misskey_io].
proxy = "direct"

[redis]
# Optional. Empty disables Redis and keeps all runtime state local to the process.
# Install support with:
#   python -m pip install -e ".[redis]"
#
# Examples:
# url = "redis://127.0.0.1:6379/0"
# url = "rediss://:password@example.redis.cloud:6380/0"
url = ""

# Prefix for all NyaGallery Redis keys. Use a unique value per deployment.
key_prefix = "nyagallery"

# When true, request concurrency/rate/traffic limits are shared through Redis
# instead of being tracked in local process memory. Useful once multiple API
# instances are running behind the same frontend/proxy.
security_limiter = false

[security]
# Deployment secret used to encrypt reusable third-party credentials such as
# Pixiv Token/Cookie, proxy passwords and cloud storage password/token/access_key_secret.
# `nyagallery setup`, backend startup with this config file, and the developer
# config editor generate one automatically when this is empty. Keep the same
# value across restarts and backend instances.
secret_key = ""

[developer]
# Allows users with the developer role to edit this TOML file from the admin UI.
config_editor_enabled = true

# Enables the web developer console allowlist. Keep false unless this backend is
# protected by trusted network/auth controls. The console does not expose
# arbitrary shell execution; it only enables explicit maintenance actions.
console_enabled = false
